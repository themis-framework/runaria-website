<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Themis Framework – Privacy Policies</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0d0f14;
      color: #d8dce8;
      line-height: 1.7;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 0.04em;
    }

    header p {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: #7a8099;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem;
    }

    .links a {
      display: block;
      padding: 1rem 1.5rem;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      color: #c9a84c;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 500;
      transition: background 0.15s;
    }

    .links a:hover {
      background: #161921;
      text-decoration: underline;
    }

    footer {
      text-align: center;
      margin-top: 4rem;
      font-size: 0.8rem;
      color: #4a4f63;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Themis Framework</h1>
      <p>Privacy Policies</p>
    </header>

    <div class="links">
      <a href="/runaria-privacy-policy/">Runaria – Cipher Puzzle &rarr; Privacy Policy</a>
      <a href="/cadens-privacy-policy/">Cadens &rarr; Privacy Policy</a>
    </div>

    <footer>
      &copy; 2026 Themis Framework. All rights reserved.
    </footer>
  </div>
</body>
</html>
